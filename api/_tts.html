<html>
<body>
list of vailable voices for speech synthesis to refine the results within utility.js _client._tts.getVoice() (e.g. by early exiting)<br /><br />
</body>
	<script>
	function getVoices(languages = ['en']){
			if (!window.speechSynthesis) {
				return 'speechSynthesis not available';
			}
			let voices = window.speechSynthesis.getVoices(),
				options = {};
			// roughly filter voices by language
			voices = voices.filter(voice => {
				for (const lang of languages) {
					if (voice.lang.toLowerCase().startsWith(lang)) return true;
				}
				return false;
			});
			for (let i = voices.length - 1; i > 0; i--) {
				// for (let i = 0; i < voices.length; i++) {
				if (!options[voices[i].lang.toLowerCase()]) options[voices[i].lang.toLowerCase()] = [];
				options[voices[i].lang.toLowerCase()].push(voices[i].name);
			}
			return `${navigator.userAgent}<br><pre>${JSON.stringify(options, null, 4)}</pre>`;
		}
	document.body.innerHTML += getVoices(['de', 'en']);
</script>

</html>
